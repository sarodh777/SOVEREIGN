# Server Configuration
server.port=8080

# SMTP Configuration (For Google App Password)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
# IMPORTANT: Set these environment variables in your deployment
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.from=${MAIL_USERNAME:your-email@gmail.com}
# Use environment variable for app password
spring.mail.password=${MAIL_PASSWORD:your-app-password}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# OAuth2 Configuration - Use environment variables for security
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:your-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:your-client-secret}
spring.security.oauth2.client.registration.google.scope=profile, email

# MySQL Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/sovereign_ledger?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:SQL123}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

