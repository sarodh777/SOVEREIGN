services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: sovereign_mysql
    environment:
      MYSQL_ROOT_PASSWORD: SQL123
      MYSQL_DATABASE: sovereign_ledger
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - sovereign_network

  # Backend Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sovereign_backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/sovereign_ledger?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: SQL123
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - sovereign_network
    restart: unless-stopped

  # Frontend Service (optional - for production build)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: sovereign_frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: "http://localhost:8080"
    depends_on:
      - backend
    networks:
      - sovereign_network
    restart: unless-stopped

volumes:
  mysql_data:

networks:
  sovereign_network:
    driver: bridge
